name: Deploy Website Infrastructure

on:
  push:
    branches: [main]
    paths:
      - '04-terraform/**'
  pull_request:
    branches: [main]
    paths:
      - '04-terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "eu-west-2"
  TF_STATE_BUCKET: "clarisys-terraform-state"

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set-env.outputs.environments }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'environments=["${{ inputs.environment }}"]' >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["dev","prod"]' >> "$GITHUB_OUTPUT"
          fi

  terraform:
    needs: determine-environment
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.determine-environment.outputs.environments) }}
      fail-fast: false

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: 04-terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=website/${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Format Check
        working-directory: 04-terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: 04-terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: 04-terraform
        id: plan
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}.tfvars \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('04-terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...truncated' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan - \`${{ matrix.environment }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        working-directory: 04-terraform
        run: terraform apply -auto-approve tfplan
