# HTTPS reverse proxy for OPA Standards Evaluation API
#
# Companion file (NOT in this repo): /etc/nginx/conf.d/opa-api-keys.conf
# defines `map $http_x_api_key $opa_api_key_valid { ... }` with hashed keys.
# Without that file, `nginx -t` will fail on the `$opa_api_key_valid` checks
# below. Rotate keys by editing that file and `systemctl reload nginx`.

upstream opa_api_backend {
    server 127.0.0.1:8001;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/opa-api.crt;
    ssl_certificate_key /etc/nginx/ssl/opa-api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;
    client_body_buffer_size 1m;

    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;
    gzip_proxied any;

    # Common proxy headers reused by every location.
    proxy_http_version 1.1;
    proxy_set_header Connection         "";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  https;


    # Grafana behind Nginx at /grafana
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_read_timeout 90s;
    }

    # ── Unauthenticated endpoints (liveness only) ───────────────────────────
    location = /health {
        proxy_pass http://opa_api_backend;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── Streaming bulk endpoints (NDJSON, no buffering) ─────────────────────
    location ~ ^/(evaluate|intake/evaluate)/bulk/stream$ {
        if ($opa_api_key_valid != 1) {
            add_header WWW-Authenticate 'ApiKey realm="opa-api"' always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff"   always;
            add_header X-Frame-Options           "DENY"      always;
            add_header Referrer-Policy           "no-referrer" always;
            return 401;
        }
        proxy_pass http://opa_api_backend;
        proxy_connect_timeout 10s;
        proxy_send_timeout   120s;
        proxy_read_timeout   120s;
        proxy_buffering off;
        gzip off;
    }

    # ── Public upload UI (unique path) ─────────────────────────────────────
    location = /firewall-audit-ui {
        return 302 /firewall-audit-ui/;
    }

    location = /firewall-audit-ui/ {
        proxy_pass http://opa_api_backend/audit/ui;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Everything else requires X-API-Key ──────────────────────────────────
    location / {
        if ($opa_api_key_valid != 1) {
            add_header WWW-Authenticate 'ApiKey realm="opa-api"' always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff"   always;
            add_header X-Frame-Options           "DENY"      always;
            add_header Referrer-Policy           "no-referrer" always;
            return 401;
        }
        proxy_pass http://opa_api_backend;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering on;
    }
}

# HTTP→HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
